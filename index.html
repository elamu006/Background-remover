<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Transition Effect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="img-box">
        <!-- Background Image -->
        <img src="assets/background.jpg" class="bg-img">

        <!-- Foreground Image -->
        <div class="img-wrap">
            <img src="assets/cars.jpg" id="originalImg">
        </div>

        <!-- Slider Line -->
        <span id="line">
            <img src="assets/Left-right_arrow.png" class="arrow">
        </span>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
